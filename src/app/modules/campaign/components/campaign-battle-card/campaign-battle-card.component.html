@let _isLocked = isLockedConfig();
@let _battle = battle();

<div
  class="battle-card"
  [ngClass]="{ 'is-boss': _battle.isBoss, selected: isSelected(), locked: _isLocked.locked }"
  (click)="onClick()">
  <mat-icon class="information-btn" (click)="openBattleInformationModal($event)"
    >info_outline</mat-icon
  >
  <div class="battle-card__header">
    <span class="battle-card__label">
      @if (_battle.isBoss) {
        👑 BOSS
      } @else {
        Battle {{ _battle.battleIndex + 1 }}
      }
    </span>
  </div>
  <div class="battle-card__avatar">
    <img
      [src]="_battle.baseOpponent.src"
      [alt]="_battle.baseOpponent.name"
      class="battle-card__img" />
  </div>
  <div class="battle-card__info">
    <p class="battle-card__name">{{ _battle.baseOpponent.name }}</p>
    <p class="battle-card__level">Lv. {{ _battle.baseOpponent.level }}</p>
  </div>

  @if (_isLocked.locked) {
    <app-container-label>
      @if (_isLocked.label) {
        <span ngProjectAs="content" class="banner">{{ _isLocked.label }}</span>
      }
    </app-container-label>
  }
</div>
