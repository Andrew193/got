<div class="preview-container">
  <div class="m-2">
    <div class="text-center">
      <h3>{{ selectedTileHero.name }}</h3>
    </div>
    <div class="row main-content m-0">
      <aside class="p-2 stats-bar justify-content-between mb-0">
        <div class="p-2 justify-content-evenly color-white hero-bar">
          <app-stats [selectedHero]="selectedHero">
            <app-rating ngProjectAs="reward-avatar-container" [rating]="selectedHero.rank" />
          </app-stats>
          <app-skills-render
            [convertTextToLowercase]="false"
            [storesInnerDivClass]="'p-2'"
            [selectedHero]="selectedTileHero"
            [showSkillName]="true"></app-skills-render>
        </div>
      </aside>
      <aside class="p-2 stats-bar justify-content-between mb-0 color-white">
        <div class="p-2 eq-container">
          <p class="mb-0 text-center fw-bold">Equipment</p>
          <div class="row g-2 m-0">
            @if (currency$ | async; as currency) {
              @for (eqName of eqNames; track eqName) {
                <div class="col-12 col-sm-6 col-lg-3">
                  <app-equipment-card
                    [eqName]="eqName"
                    [hero]="selectedHero"
                    [currency]="currency"
                    [heroName]="$any(selectedHero.name)"
                    [userId]="userId"
                    [getGearDescription]="getGearDescription"
                    [gearParts]="gearParts"
                    [getIncrement]="getIncrement"
                    (upgraded)="onEquipmentUpgraded()" />
                </div>
              }
            }
          </div>
        </div>
        <app-taverna-pages-footer />
      </aside>
    </div>
  </div>
</div>
